<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 จดหมายจากคนคนนึง</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="glow"></div>

<div id="hearts"></div>

<div class="envelope" id="envelope">

    <div class="flap"></div>

    <div class="body-envelope">
        💌 จดหมายจากคนคนนึง
    </div>

</div>

<div class="card" id="card">

    <div class="icon">🌹</div>

    <h1 id="title"></h1>

    <p id="message"></p>

    <input
        id="name"
        placeholder="ชื่อของคุณ">

    <div>

        <button
            class="yes"
            onclick="sendAnswer('YES')">
            YES 💖
        </button>

        <button
            class="no"
            onclick="sendAnswer('NO')">
            NO 🥺
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
