<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Special One</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>

    <div id="welcome-screen">
        <div class="glass-card">
            <div class="photo-container">
                <img src="memory.jpg" alt="Our Memory" class="small-photo">
            </div>

            <h1>สิ่งที่เป็นไปไม่ได้...</h1>
            <p>แต่ตอนนี้มันอยู่ตรงหน้าคุณแล้ว</p>
            
            <div class="button-border-box">
                <div class="button-group">
                    <button id="btn-open" class="btn primary">Open</button>
                    <button id="btn-close" class="btn secondary">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="overlay-text">
            <h2>I LOVE YOU</h2>
        </div>
    </div>

    <audio id="myAudio" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
