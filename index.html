<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Someone Special</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.93/build/spline-viewer.js"></script>
</head>
<body>

    <div id="welcome-screen">
        <div class="glass-card">
            <h1>สิ่งที่เป็นไปไม่ได้...</h1>
            <p>แต่ตอนนี้มันอยู่ตรงหน้าคุณแล้ว</p>
            <div class="button-group">
                <button id="btn-open" class="btn primary">Open</button>
                <button id="btn-close" class="btn secondary">Close</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <spline-viewer url="https://prod.spline.design/9M2jS7vI6V5k9Z5C/scene.splinecode"></spline-viewer>
        
        <div class="overlay-text">
            <h2>You are my impossible dream come true.</h2>
            <p>หมุนดอกไม้ดูความสวยงามได้นะ...</p>
        </div>
    </div>

    <audio id="myAudio" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
